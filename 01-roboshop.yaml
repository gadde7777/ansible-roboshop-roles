- name: Instance Creation and R53 record
  hosts: all
  connection: local
  vars:
   sg_id: "sg-0d48b1166075f71bf"
   ami_id: "ami-0220d79f3f480ecf5"
   domain_name: "daws88straining.online"
   action: create
   env: dev
   instances:
    # - mongodb
    # - catalogue
    - cart
  tasks:
  - name: create EC2 instance
    amazon.aws.ec2_instance:
       instance_type: "t3.micro"
       security_group: "{{ sg_id }}"
       image_id: "{{ ami_id }}"
       name: " {{item}}-{{env}} "
       tags: 
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{env}}"
        Name: " {{item}}-{{env}} "
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"  

  - name: Print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: action == "create"  

      #*****************create R53 RECORDS*****************

  - name: ADDING R53 RECORD
    amazon.aws.route53:
     state: present
     zone:  "{{ domain_name }}"
     record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
     type: A
     ttl: 1
     value: "{{ item.instances[0].private_ip_address }}"
     wait: true
    loop: "{{ ec2_output.results }}"
    when: action == "create"  

  - name: Create R53 for front end
    amazon.aws.route53:
     state: present
     zone:  "{{ domain_name }}"
     record: "roboshop-{{ env }}.{{ domain_name }}"
     type: A
     ttl: 1
     value: "{{ item.instances[0].public_ip_address }}"
     wait: true
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create"   

  - name: Retrieving R53 records
    amazon.aws.route53:
     state: get
     zone: "{{ domain_name }}"
     record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
     type: A
    loop: "{{ ec2_output.results }}"
    register: rec

  - name: Delete R53 records
    amazon.aws.route53:
     state: absent
     zone: "{{ domain_name }}"
     record: "{{ item }}-{{ env }}.{{ domain_name }}"
     ttl: 1
     type: A
    loop: "{{ instances }}"
    when: action == "destroy"

    - name: delete r53 records for frontend
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" # roboshop-dev.daws88s.online
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when:  # and
    - item == "frontend"
    - action == "destroy"

  - name: Delete Instances
    amazon.aws.ec2_instance:
     state: absent
     Name: " {{item}}-{{env}} "
     wait: false
    loop: "{{ instances }}"
    when: action == "destroy"
     



   
